name: A-share Intelligence Live Smoke

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: ashare-live-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run A-share provider live smoke
        env:
          ASHARE_INTELLIGENCE_ENABLED: "true"
          ASHARE_PROVIDER_PRIORITY: "astock_data"
          ASHARE_CACHE_DIR: ${{ runner.temp }}/ashare-cache
          ASHARE_CACHE_MAX_FILES: "100"
          ASHARE_CONFIG_FILE: config/ashare_intelligence.yaml
        run: |
          python - <<'PY' | tee ashare-live-smoke.json
          import json
          import sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from src.config import Config
          from data_provider.intelligence.manager import AShareIntelligenceManager

          Config.reset_instance()
          config = Config.get_instance()
          trade_date = datetime.now(ZoneInfo("Asia/Shanghai")).date().isoformat()
          manager = AShareIntelligenceManager(config)
          result = manager.get_capability(
              "sector_fund_flow",
              trade_date=trade_date,
              as_of_bucket=f"{trade_date}-live-smoke",
              limit=3,
              refresh=True,
          )
          payload = {
              "capability": result.capability,
              "provider": result.provider,
              "status": result.status,
              "trade_date": trade_date,
              "coverage": result.coverage,
              "source": result.source.model_dump(mode="json") if result.source else None,
          }
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          coverage_ratio = 0.0
          if isinstance(result.coverage, dict):
              try:
                  coverage_ratio = float(result.coverage.get("coverage_ratio") or 0.0)
              except (TypeError, ValueError):
                  coverage_ratio = 0.0
          if result.status == "ok":
              sys.exit(0)
          if result.status == "partial" and coverage_ratio >= 0.5:
              sys.exit(0)
          if result.status == "empty":
              print("A-share live smoke returned empty data; this is not accepted for a scheduled trading-day smoke.", file=sys.stderr)
              sys.exit(3)
          if result.status == "stale":
              print("A-share live smoke returned stale cache; live provider path is not healthy.", file=sys.stderr)
              sys.exit(4)
          if result.status not in {"ok", "partial"}:
              sys.exit(2)
          print(f"A-share live smoke partial coverage too low: {coverage_ratio}", file=sys.stderr)
          sys.exit(5)
          PY

      - name: Upload live smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ashare-live-smoke-${{ github.run_number }}
          path: ashare-live-smoke.json
          if-no-files-found: ignore
